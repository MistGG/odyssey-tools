<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spiral Mountain Tour Tracker</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #e0e0e0; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 600px; background: #1e1e1e; padding: 20px; border-radius: 12px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #00d4ff; margin-bottom: 5px; }
        .server-time { text-align: center; font-size: 1.2rem; margin-bottom: 20px; color: #888; }
        .boss-card { display: flex; justify-content: space-between; align-items: center; padding: 15px; margin-bottom: 10px; background: #252525; border-radius: 8px; transition: 0.3s; border-left: 5px solid #444; }
        .boss-card.active { border-left-color: #00ff88; background: #2a352f; transform: scale(1.02); }
        .boss-info { flex-grow: 1; }
        .boss-name { font-weight: bold; font-size: 1.1rem; color: #fff; }
        .boss-map { font-size: 0.85rem; color: #aaa; }
        .boss-buff { font-size: 0.9rem; color: #ffcc00; font-weight: bold; }
        .timer { font-family: 'Courier New', Courier, monospace; font-size: 1.4rem; color: #00d4ff; min-width: 100px; text-align: right; }
    </style>
</head>
<body>

<div class="container">
    <h2>Spiral Mountain Tour</h2>
    <div class="server-time" id="serverTime">UTC: 00:00:00</div>
    
    <div id="bossList">
        </div>
</div>

<script>
    const bosses = [
        { name: "Shellmon", map: "Forest of Beginning", buff: "SK Buff", minute: 0 },
        { name: "Gerbemon", map: "Forest of Marionette", buff: "TA Buff", minute: 6 },
        { name: "Megadramon", map: "Metal Empire", buff: "AA Buff", minute: 12 },
        { name: "LadyDevimon", map: "Nightmare Top", buff: "SUP Buff", minute: 18 }
    ];

    function updateTimers() {
        const now = new Date();
        const utcMinutes = now.getUTCMinutes();
        const utcSeconds = now.getUTCSeconds();
        
        document.getElementById('serverTime').innerText = `UTC: ${now.toUTCString().split(' ')[4]}`;

        let html = "";
        bosses.forEach(boss => {
            // Calculate time until next spawn
            let targetMinute = boss.minute;
            let diffMinutes = targetMinute - utcMinutes;
            let diffSeconds = 0 - utcSeconds;

            if (diffSeconds < 0) {
                diffSeconds += 60;
                diffMinutes--;
            }
            if (diffMinutes < 0) {
                diffMinutes += 60;
            }

            // Formatting time string
            let timeStr = `${String(diffMinutes).padStart(2, '0')}:${String(diffSeconds).padStart(2, '0')}`;
            
            // Highlight if boss is spawning within the next 2 minutes
            let isActive = (diffMinutes === 0 || diffMinutes >= 58);

            html += `
                <div class="boss-card ${isActive ? 'active' : ''}">
                    <div class="boss-info">
                        <div class="boss-name">${boss.name}</div>
                        <div class="boss-map">${boss.map}</div>
                        <div class="boss-buff">${boss.buff}</div>
                    </div>
                    <div class="timer">${timeStr}</div>
                </div>
            `;
        });
        document.getElementById('bossList').innerHTML = html;
    }

    setInterval(updateTimers, 1000);
    updateTimers();
</script>

</body>
</html>
