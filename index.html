<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMO Tour Tracker</title>
    <style>
        :root { 
            --bg: #0a0a0c; 
            --card: #151518; 
            --primary: #00d4ff; 
            --active: #00ff88; 
            --text: #e0e0e0; 
            --text-dim: #888;
            --spiral: #9d00ff; 
            --forest: #2ecc71; 
            --accent: #ffcc00;
            --danger: #ff4757;
            --border: #222;
            --overlay: rgba(0, 0, 0, 0.85);
            --event: #ff9f43;
            --discord: #5865F2;
            --discord-hover: #4752c4;
        }

        [data-theme="light"] {
            --bg: #f4f7f9;
            --card: #ffffff;
            --primary: #0088cc;
            --active: #27ae60;
            --text: #2c3e50;
            --text-dim: #7f8c8d;
            --border: #dcdde1;
            --overlay: rgba(255, 255, 255, 0.95);
        }
        
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            display: flex; 
            justify-content: center; 
            padding: 20px; 
            margin: 0; 
            transition: background 0.3s, color 0.3s;
        }
        
        .container { width: 100%; max-width: 450px; position: relative; }

        /* Updated Top Nav for Inline Layout */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            gap: 10px;
        }

        .nav-right {
            display: flex;
            gap: 10px;
        }

        /* Discord Button Styling */
        .discord-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--discord);
            color: white;
            padding: 6px 12px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
            border: none;
            box-shadow: 0 4px 10px rgba(88, 101, 242, 0.2);
        }

        .discord-btn:hover {
            background: var(--discord-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(88, 101, 242, 0.3);
        }

        .discord-gif {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            display: block;
        }

        .icon-btn {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text-dim);
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .icon-btn:hover {
            color: var(--primary);
            border-color: var(--primary);
        }

        .icon-btn svg { width: 18px; height: 18px; fill: currentColor; }
        
        h2 { 
            border-bottom: 1px solid var(--border); 
            padding-bottom: 8px; 
            color: var(--primary); 
            font-size: 0.85rem; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin: 20px 0 15px 0; 
            display: flex;
            align-items: center;
        }
        
        h2::before { content: '◈'; margin-right: 8px; font-size: 0.7rem; }

        .server-time { 
            text-align: center; 
            font-size: 1.8rem; 
            margin-bottom: 10px; 
            font-weight: 900; 
            background: var(--card);
            padding: 15px; 
            border-radius: 12px; 
            border: 1px solid var(--border); 
            color: var(--text); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            font-family: 'Courier New', monospace;
        }

        .utc-label { font-size: 0.7rem; color: var(--text-dim); display: block; margin-top: -5px; letter-spacing: 3px; }

        .boss-card { 
            position: relative; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 16px; 
            margin-bottom: 12px; 
            background: var(--card); 
            border-radius: 10px; 
            border: 1px solid var(--border);
            border-left: 4px solid var(--text-dim); 
            transition: transform 0.2s ease;
        }

        .tour-label { 
            font-size: 0.6rem; 
            font-weight: 900; 
            text-transform: uppercase; 
            padding: 2px 8px; 
            border-radius: 20px; 
            margin-bottom: 6px; 
            display: inline-block; 
            letter-spacing: 1px; 
        }
        .label-spiral { background: rgba(157, 0, 255, 0.15); color: #9d00ff; border: 1px solid var(--spiral); }
        .label-forest { background: rgba(46, 204, 113, 0.15); color: #27ae60; border: 1px solid var(--forest); }
        .label-event { background: rgba(255, 159, 67, 0.15); color: var(--event); border: 1px solid var(--event); }

        .boss-card.upcoming { border-left-color: var(--primary); background: var(--card); border-color: var(--primary); }
        .boss-card.active { 
            border-left-color: var(--active); 
            background: var(--card); 
            border-color: var(--active);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.1);
        }

        .boss-card.event-active {
            border-left-color: var(--event);
            border-color: var(--event);
            background: rgba(255, 159, 67, 0.05);
        }
        
        .boss-info { line-height: 1.4; }
        .boss-name { font-weight: 800; font-size: 1.15rem; color: var(--text); }
        .boss-map { font-size: 0.8rem; color: var(--text-dim); }
        .boss-buff { font-size: 0.85rem; color: var(--accent); font-weight: bold; }
        
        .timer { 
            font-family: 'Consolas', 'Monaco', monospace; 
            font-size: 1.4rem; 
            color: var(--primary); 
            font-weight: bold; 
            min-width: 90px; 
            text-align: right; 
        }
        
        .active .timer { color: var(--active); }
        .active .timer::after { content: ' LIVE'; font-size: 0.5rem; display: block; margin-top: -5px; }

        .event-active .timer { color: var(--event); }
        .event-active .timer::after { content: ' OPEN'; font-size: 0.5rem; display: block; margin-top: -5px; }

        .empty-msg { color: var(--text-dim); font-style: italic; text-align: center; padding: 20px; font-size: 0.9rem; border: 1px dashed var(--border); border-radius: 10px; }

        /* Settings Modal */
        #settingsOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--overlay);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .settings-modal {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .settings-header h3 { margin: 0; color: var(--primary); font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; }

        .close-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 1.5rem; }

        .setting-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            font-size: 0.95rem;
        }

        .setting-group label { cursor: pointer; flex-grow: 1; font-weight: 500; }

        .lead-time-input {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 6px 10px;
            border-radius: 6px;
            width: 60px;
            text-align: center;
            margin-left: 10px;
        }

        .test-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            width: 100%;
            margin-top: 15px;
            font-weight: bold;
            transition: filter 0.2s;
        }

        .test-btn:hover { filter: brightness(1.1); }
    </style>
</head>

    <div class="server-time">
        <span id="serverTime">00:00:00</span>
        <span class="utc-label">SERVER UTC</span>
    </div>

    <div class="section" id="liveSection" style="display:none;">
        <h2 style="color:var(--active);">🔥 Live Tours</h2>

    <div class="settings-modal" onclick="event.stopPropagation()">
        <div class="settings-header">

            <button class="close-btn" onclick="document.getElementById('settingsOverlay').style.display='none'">&times;</button>

        <div style="color: var(--text-dim); font-size: 0.7rem; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px;">Notifications</div>

<script>
    // Configuration
    const tours = [
        { id: 'shellmon', name: "Shellmon", map: "Forest of Beginning", buff: "SK Buff", type: "hourly", offset: 0, liveDuration: 345, label: "Spiral Tour", lClass: "label-spiral" },
        { id: 'gerbemon', name: "Gerbemon", map: "Forest of Marionette", buff: "TA Buff", type: "hourly", offset: 6, liveDuration: 345, label: "Spiral Tour", lClass: "label-spiral" },
        { id: 'megadramon', name: "Megadramon", map: "Metal Empire", buff: "AA Buff", type: "hourly", offset: 12, liveDuration: 345, label: "Spiral Tour", lClass: "label-spiral" },
        { id: 'ladydevimon', name: "LadyDevimon", map: "Nightmare Top", buff: "SUP Buff", type: "hourly", offset: 18, liveDuration: 345, label: "Spiral Tour", lClass: "label-spiral" },
        
        { id: 'orochimon', name: "Orochimon", map: "Forest", buff: "No Buff", type: "interval", interval: 90, refMinute: 1175, liveDuration: 105, label: "Forest Tour", lClass: "label-forest" },
        { id: 'mugendramon', name: "Mugendramon", map: "Forest", buff: "No Buff", type: "interval", interval: 90, refMinute: 1177, liveDuration: 105, label: "Forest Tour", lClass: "label-forest" },
        { id: 'chaosdramon', name: "Chaosdramon", map: "Forest", buff: "No Buff", type: "interval", interval: 90, refMinute: 1179, liveDuration: 105, label: "Forest Tour", lClass: "label-forest" },
        { id: 'banchouleomon', name: "BanchouLeomon", map: "Forest", buff: "No Buff", type: "interval", interval: 90, refMinute: 1181, liveDuration: 105, label: "Forest Tour", lClass: "label-forest" },
        { id: 'beelzebumon_1', name: "Beelzebumon", map: "Forest", buff: "No Buff", type: "interval", interval: 90, refMinute: 1183, liveDuration: 105, label: "Forest Tour", lClass: "label-forest" },
        { id: 'megidramon', name: "Megidramon", map: "Forest", buff: "No Buff", type: "interval", interval: 90, refMinute: 1185, liveDuration: 105, label: "Forest Tour", lClass: "label-forest" },
        { id: 'beelzebumon_2', name: "Beelzebumon", map: "Forest", buff: "No Buff", type: "interval", interval: 90, refMinute: 1187, liveDuration: 105, label: "Forest Tour", lClass: "label-forest" },
        { id: 'zhuqiaomon', name: "Zhuqiaomon", map: "Forest", buff: "No Buff", type: "interval", interval: 90, refMinute: 1189, liveDuration: 105, label: "Forest Tour", lClass: "label-forest" }
    ];

    const specialEvents = [
        { id: 'ogpass', name: "OG Pass", map: "Special Event", buff: "Fortune Event", type: "interval", interval: 120, refMinute: 1200, liveDuration: 1800, label: "Special Event", lClass: "label-event" }
    ];

    let lastToursData = [];
    let lastEventData = [];
    let wakeLock = null;

    // Wake Lock Logic
    async function handleWakeLock(enabled) {
        if (!('wakeLock' in navigator)) return;
        if (enabled) {
            try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
        } else {
            if (wakeLock) { wakeLock.release(); wakeLock = null; }
        }
    }

    // Audio
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playBeep() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = 'sine'; osc.frequency.setValueAtTime(880, audioCtx.currentTime); 
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
        osc.start(); osc.stop(audioCtx.currentTime + 0.5);
    }

    function openSettings() { document.getElementById('settingsOverlay').style.display = 'flex'; }
    function closeSettings(e) { if (e.target.id === 'settingsOverlay') e.target.style.display = 'none'; }

    function toggleTheme() {
        const body = document.body;
        const currentTheme = body.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        body.setAttribute('data-theme', newTheme);
        localStorage.setItem('dmo_tour_theme', newTheme);
        updateThemeIcon(newTheme);
    }

    function updateThemeIcon(theme) {
        const icon = document.getElementById('themeIcon');
        icon.innerHTML = theme === 'light' ? '<path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/>' : '<path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96a.996.996 0 000-1.41.996.996 0 00-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36a.996.996 0 000-1.41.996.996 0 00-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/>';
    }

    function saveSettings() {
        const settings = {
            spiral: document.getElementById('notifySpiral').checked,
            forest: document.getElementById('notifyForest').checked,
            event: document.getElementById('notifyEvent').checked,
            leadTime: parseInt(document.getElementById('leadTime').value) || 1,
            wakeLock: document.getElementById('wakeLock').checked
        };
        localStorage.setItem('dmo_tour_settings', JSON.stringify(settings));
        handleWakeLock(settings.wakeLock);
    }

    function loadData() {
        const savedSettings = localStorage.getItem('dmo_tour_settings');
        if (savedSettings) {
            const s = JSON.parse(savedSettings);
            document.getElementById('notifySpiral').checked = s.spiral;
            document.getElementById('notifyForest').checked = s.forest;
            document.getElementById('notifyEvent').checked = !!s.event;
            document.getElementById('leadTime').value = s.leadTime;
            document.getElementById('wakeLock').checked = !!s.wakeLock;
            handleWakeLock(!!s.wakeLock);
        }
        const savedTheme = localStorage.getItem('dmo_tour_theme') || 'dark';
        document.body.setAttribute('data-theme', savedTheme);
        updateThemeIcon(savedTheme);
    }

    document.querySelectorAll('input').forEach(input => {
        input.addEventListener('change', saveSettings);
    });

    function getNextSpawn(tour) {
        const now = new Date();
        const nowTotalSec = (now.getUTCHours() * 3600) + (now.getUTCMinutes() * 60) + now.getUTCSeconds();
        if (tour.type === "hourly") {
            const offsetSec = tour.offset * 60;
            let targetSec = (now.getUTCHours() * 3600) + offsetSec;
            if (nowTotalSec >= targetSec) targetSec += 3600;
            return (targetSec - nowTotalSec + 86400) % 86400;
        } 
        const intervalSec = tour.interval * 60;
        const refSec = (tour.refMinute * 60) % 86400;
        let diff = nowTotalSec - refSec;
        let intervalsCount = Math.ceil(diff / intervalSec);
        let nextSec = refSec + (intervalsCount * intervalSec);
        while (nextSec <= nowTotalSec) nextSec += intervalSec;
        return (nextSec - nowTotalSec + 86400) % 86400;
    }

    function formatTime(seconds) {
        const h = Math.floor(seconds / 3600);
        const m = Math.floor((seconds % 3600) / 60);
        const s = seconds % 60;
        return (h > 0 ? h + ":" : "") + String(m).padStart(2, '0') + ":" + String(s).padStart(2, '0');
    }

    function update() {
        const now = new Date();
        document.getElementById('serverTime').innerText = now.toUTCString().split(' ')[4];
        const leadSec = (parseInt(document.getElementById('leadTime').value) || 1) * 60;

        const processItems = (itemList) => itemList.map(t => {
            const timeLeft = getNextSpawn(t);
            const interval = t.type === 'hourly' ? 3600 : t.interval * 60;
            const timeSinceLastSpawn = (interval - timeLeft) % interval;
            const isLive = timeSinceLastSpawn < t.liveDuration;
            return { ...t, timeLeft, isLive, liveRemaining: isLive ? (t.liveDuration - timeSinceLastSpawn) : 0 };
        });

        const tourData = processItems(tours);
        const eventData = processItems(specialEvents);

        // Check Notifications using Threshold Crossing Logic
        const checkNotify = (current, previousList, settingKey, onlyBossId = null) => {
            if (!document.getElementById(settingKey).checked) return;
            const prev = previousList.find(p => p.id === current.id);
            if (!prev) return;
            if (prev.timeLeft > leadSec && current.timeLeft <= leadSec && current.timeLeft > 0) {
                if (!onlyBossId || current.id === onlyBossId) playBeep();
            }
        };

        tourData.forEach(t => {
            checkNotify(t, lastToursData, 'notifySpiral', 'shellmon');
            checkNotify(t, lastToursData, 'notifyForest', 'orochimon');
        });
        eventData.forEach(e => checkNotify(e, lastEventData, 'notifyEvent'));

        lastToursData = tourData; lastEventData = eventData;

        let liveHtml = "", upcomingHtml = "", eventHtml = "", fullHtml = "";

        const renderCard = (tour, extraClass = "") => `
            <div class="boss-card ${tour.isLive ? 'active ' + extraClass : (tour.timeLeft < 900 ? 'upcoming' : '')}">
                <div class="boss-info">
                    <span class="tour-label ${tour.lClass}">${tour.label}</span>
                    <div class="boss-name">${tour.name}</div>
                    <div class="boss-map">${tour.map}</div>
                    <div class="boss-buff">${tour.isLive ? (tour.label === 'Special Event' ? 'Window Open' : tour.buff) : tour.buff}</div>
                </div>
                <div class="timer">${formatTime(tour.isLive ? tour.liveRemaining : tour.timeLeft)}</div>
            </div>
        `;

        tourData.forEach(t => {
            if (t.isLive) {
                liveHtml += renderCard(t);
            } else if (t.timeLeft < 900) {
                upcomingHtml += renderCard(t);
            }
        });

        eventData.forEach(e => eventHtml += renderCard(e, 'event-active'));

        tourData
            .filter(t => !t.isLive && t.timeLeft >= 900)
            .sort((a, b) => a.timeLeft - b.timeLeft)
            .forEach(t => fullHtml += renderCard(t));

        document.getElementById('liveSection').style.display = liveHtml ? 'block' : 'none';
        document.getElementById('liveList').innerHTML = liveHtml;
        document.getElementById('eventList').innerHTML = eventHtml;
        document.getElementById('upcomingList').innerHTML = upcomingHtml || '<div class="empty-msg">No tours starting soon...</div>';
        document.getElementById('fullList').innerHTML = fullHtml;
    }

    window.onload = () => { loadData(); setInterval(update, 1000); update(); };
</script>
