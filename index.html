<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMO Tour Tracker</title>
    <style>
        :root { 
            --bg: #0a0a0c; 
            --header-bg: #111114;
            --sidebar-bg: #111114;
            --card: #151518; 
            --primary: #00d4ff; 
            --active: #00ff88; 
            --text: #e0e0e0; 
            --text-dim: #888;
            --spiral: #9d00ff; 
            --forest: #2ecc71; 
            --tokyo: #ff2e71;
            --accent: #ffcc00;
            --danger: #ff4757;
            --border: #222;
            --overlay: rgba(0, 0, 0, 0.85);
            --event: #ff9f43;
            --discord: #5865F2;
            --discord-hover: #4752c4;
            --nav-width: 240px;
            --header-height: 60px;
        }

        [data-theme="light"] {
            --bg: #f4f7f9;
            --header-bg: #ffffff;
            --sidebar-bg: #ffffff;
            --card: #ffffff;
            --primary: #0088cc;
            --active: #27ae60;
            --text: #2c3e50;
            --text-dim: #7f8c8d;
            --border: #dcdde1;
            --overlay: rgba(255, 255, 255, 0.95);
        }
        
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            transition: background 0.3s, color 0.3s;
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Sidebar Layout --- */
        .sidebar {
            width: var(--nav-width);
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            display: flex;
            flex-direction: column;
            z-index: 1001;
            transition: transform 0.3s ease;
        }

        .sidebar-header {
            height: var(--header-height);
            display: flex;
            align-items: center;
            padding: 0 20px;
            font-weight: 900;
            letter-spacing: 1px;
            color: var(--primary);
            border-bottom: 1px solid var(--border);
            text-transform: uppercase;
        }

        .nav-links {
            padding: 20px 10px;
            flex-grow: 1;
            overflow-y: auto;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            border-radius: 8px;
            text-decoration: none;
            color: var(--text);
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 5px;
            transition: all 0.2s;
        }

        .nav-item.active {
            background: rgba(0, 212, 255, 0.1);
            color: var(--primary);
        }

        .nav-item:hover:not(.active) {
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-icon { width: 20px; height: 20px; fill: currentColor; }

        .sidebar-footer {
            padding: 15px 20px;
            border-top: 1px solid var(--border);
            font-size: 0.75rem;
            color: var(--text-dim);
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* --- Main Content Area --- */
        .main-wrapper {
            flex-grow: 1;
            margin-left: var(--nav-width);
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 10;
        }

        /* --- Global Top Header --- */
        .global-header {
            height: var(--header-height);
            background: var(--header-bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .page-title-mobile { display: none; font-weight: 800; color: var(--primary); }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-left: auto;
        }

        /* --- Content Container --- */
        .content-area {
            padding: 30px 20px;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
        }

        /* Discord Button Styling */
        .discord-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--discord);
            color: white;
            padding: 8px 14px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(88, 101, 242, 0.2);
        }

        .discord-btn:hover { background: var(--discord-hover); transform: translateY(-1px); }
        .discord-gif { width: 20px; height: 20px; border-radius: 4px; display: block; }

        /* Icon Buttons */
        .icon-btn {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text-dim);
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .icon-btn:hover { color: var(--primary); border-color: var(--primary); }
        .icon-btn svg { width: 18px; height: 18px; fill: currentColor; }

        /* --- Timers Specific Styling --- */
        .timers-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .server-time-card { 
            text-align: center; 
            font-size: 1.8rem; 
            margin-bottom: 30px; 
            font-weight: 900; 
            background: var(--card);
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid var(--border); 
            color: var(--text); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            font-family: 'Courier New', monospace;
        }
        .utc-label { font-size: 0.7rem; color: var(--text-dim); display: block; margin-top: -5px; letter-spacing: 3px; }

        h2 { 
            border-bottom: 1px solid var(--border); 
            padding-bottom: 8px; 
            color: var(--primary); 
            font-size: 0.85rem; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin: 30px 0 15px 0; 
            display: flex;
            align-items: center;
        }
        h2::before { content: '◈'; margin-right: 8px; font-size: 0.7rem; }

        .boss-card { 
            position: relative; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 16px; 
            margin-bottom: 12px; 
            background: var(--card); 
            border-radius: 10px; 
            border: 1px solid var(--border);
            border-left: 4px solid var(--text-dim); 
            transition: transform 0.2s ease;
        }

        .tour-label { 
            font-size: 0.6rem; 
            font-weight: 900; 
            text-transform: uppercase; 
            padding: 2px 8px; 
            border-radius: 20px; 
            margin-bottom: 6px; 
            display: inline-block; 
            letter-spacing: 1px; 
        }
        .label-spiral { background: rgba(157, 0, 255, 0.15); color: #9d00ff; border: 1px solid var(--spiral); }
        .label-forest { background: rgba(46, 204, 113, 0.15); color: #27ae60; border: 1px solid var(--forest); }
        .label-tokyo { background: rgba(255, 46, 113, 0.15); color: #ff2e71; border: 1px solid var(--tokyo); }
        .label-event { background: rgba(255, 159, 67, 0.15); color: var(--event); border: 1px solid var(--event); }

        .boss-card.upcoming { border-left-color: var(--primary); background: var(--card); border-color: var(--primary); }
        .boss-card.active { 
            border-left-color: var(--active); 
            background: var(--card); 
            border-color: var(--active);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.1);
        }
        .boss-card.event-active {
            border-left-color: var(--event);
            border-color: var(--event);
            background: #1c1814; 
            box-shadow: 0 0 15px rgba(255, 159, 67, 0.1);
        }
        
        .boss-info { line-height: 1.4; }
        .boss-name { font-weight: 800; font-size: 1.15rem; color: var(--text); }
        .boss-map { font-size: 0.8rem; color: var(--text-dim); }
        .boss-buff { font-size: 0.85rem; color: var(--accent); font-weight: bold; }
        
        .timer-container {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            min-width: 90px;
        }

        .timer { 
            font-family: 'Consolas', 'Monaco', monospace; 
            font-size: 1.4rem; 
            color: var(--primary); 
            font-weight: bold; 
            text-align: right; 
        }
        .active .timer::after { content: ' LIVE'; font-size: 0.5rem; display: block; margin-top: -5px; }
        .event-active .timer::after { content: ' OPEN'; font-size: 0.5rem; display: block; margin-top: -5px; }

        .channel-indicator {
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.75rem;
            font-weight: 900;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
            padding: 2px 8px;
            background: rgba(255, 204, 0, 0.1);
            border: 1px solid var(--accent);
            border-radius: 4px;
            animation: pulse 1.5s infinite;
            white-space: nowrap;
        }

        @keyframes pulse {
            0% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
            100% { opacity: 0.8; transform: scale(1); }
        }

        .empty-msg { color: var(--text-dim); font-style: italic; text-align: center; padding: 20px; font-size: 0.9rem; border: 1px dashed var(--border); border-radius: 10px; }

        /* Settings Modal Overlay */
        #settingsOverlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--overlay);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(5px);
        }

        .settings-modal {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            animation: slideIn 0.3s ease-out;
            max-height: 90vh;
            overflow-y: auto;
        }

        @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .settings-header h3 { margin: 0; color: var(--primary); font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; }
        .close-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 1.5rem; }

        .setting-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 0.9rem;
        }
        .setting-group label { cursor: pointer; flex-grow: 1; font-weight: 500; }
        .lead-time-input {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 6px 10px;
            border-radius: 6px;
            width: 60px;
            text-align: center;
            margin-left: 10px;
        }

        .test-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            width: 100%;
            margin-top: 15px;
            font-weight: bold;
            transition: filter 0.2s;
        }
        .test-btn:hover { filter: brightness(1.1); }

        .settings-divider {
            color: var(--text-dim); 
            font-size: 0.65rem; 
            text-transform: uppercase; 
            margin: 15px 0 10px 0; 
            letter-spacing: 1.5px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 4px;
        }

        /* --- Event Effects --- */
        #eventRainContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1; 
            overflow: hidden;
            display: none;
        }

        .falling-pass {
            position: absolute;
            width: 30px;
            height: auto;
            opacity: 0.8;
            filter: drop-shadow(0 0 5px rgba(255, 159, 67, 0.4));
            animation: fall linear forwards;
        }

        @keyframes fall {
            from { transform: translateY(-50px) rotate(0deg); }
            to { transform: translateY(110vh) rotate(360deg); }
        }

        #eventShineOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            pointer-events: none;
            z-index: 0; 
            background: radial-gradient(circle at 50% 0%, rgba(255, 159, 67, 0.15) 0%, transparent 85%);
            opacity: 0;
            transition: opacity 2s ease;
        }

        /* Responsive Mobile Tweak */
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main-wrapper { margin-left: 0; }
            .page-title-mobile { display: block; }
        }
    </style>
</head>

        { id: 'beelzebumon_2', name: "Beelzebumon", map: "Forest", buff: "Goggle farming", type: "interval", interval: 90, refMinute: 1187, liveDuration: 100, label: "Forest Tour", lClass: "label-forest", category: "forest" },

        // TOKYO TOURS (1.5h Interval, sequential windows, starts 22:56 UTC)
        { id: 'tokyo_myotismon_1', name: "Myotismon", map: "Big Sight", buff: "Digivice Farming", type: "interval", interval: 90, refMinute: 1376, liveDuration: 180, label: "Tokyo Tour", lClass: "label-tokyo", rotation: 'standard', category: "tokyo", timing: 'special' },
        { id: 'tokyo_darktyrannomon', name: "DarkTyrannomon", map: "Big Sight", buff: "Digivice Farming", type: "interval", interval: 90, refMinute: 1381, liveDuration: 180, label: "Tokyo Tour", lClass: "label-tokyo", rotation: 'reverse', category: "tokyo", timing: 'special' },
        { id: 'tokyo_groundramon', name: "Groundramon and Okuwamon", map: "Odaiba", buff: "Digivice Farming", type: "interval", interval: 90, refMinute: 1386, liveDuration: 180, label: "Tokyo Tour", lClass: "label-tokyo", rotation: 'standard', category: "tokyo", timing: 'standard' },
        { id: 'tokyo_myotismon_2', name: "Myotismon", map: "Minato City", buff: "Digivice Farming", type: "interval", interval: 90, refMinute: 1391, liveDuration: 180, label: "Tokyo Tour", lClass: "label-tokyo", rotation: 'standard', category: "tokyo", timing: 'standard' },
        { id: 'tokyo_myotismon_3', name: "Myotismon", map: "Shibuya", buff: "Digivice Farming", type: "interval", interval: 90, refMinute: 1396, liveDuration: 180, label: "Tokyo Tour", lClass: "label-tokyo", rotation: 'standard', category: "tokyo", timing: 'standard' },
        { id: 'tokyo_phantomon', name: "Phantomon", map: "Shibuya", buff: "Digivice Farming", type: "interval", interval: 90, refMinute: 1401, liveDuration: 180, label: "Tokyo Tour", lClass: "label-tokyo", rotation: 'reverse', category: "tokyo", timing: 'standard' },
        { id: 'tokyo_raremon', name: "Raremon", map: "Shibuya", buff: "Digivice Farming", type: "interval", interval: 90, refMinute: 1406, liveDuration: 180, label: "Tokyo Tour", lClass: "label-tokyo", rotation: 'standard', category: "tokyo", timing: 'standard' },
        { id: 'tokyo_mammothmon', name: "Mammothmon", map: "Valley of Light", buff: "Digivice Farming", type: "interval", interval: 90, refMinute: 1411, liveDuration: 180, label: "Tokyo Tour", lClass: "label-tokyo", rotation: 'standard', category: "tokyo", timing: 'standard' },
        { id: 'tokyo_aquilamon', name: "Aquilamon", map: "Valley of Light", buff: "Digivice Farming", type: "interval", interval: 90, refMinute: 1416, liveDuration: 180, label: "Tokyo Tour", lClass: "label-tokyo", rotation: 'reverse', category: "tokyo", timing: 'standard' }
    ];

    const specialEvents = [
        { id: 'ogpass', name: "OG Pass", map: "Special Event", buff: "Fortune Event", type: "interval", interval: 120, refMinute: 1200, liveDuration: 1800, label: "Special Event", lClass: "label-event", category: "event" }
    ];

    let lastToursData = [];
    let lastEventData = [];
    let wakeLock = null;
    let effectInterval = null;

    // --- Audio System ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    // Resume audio context on any user interaction
    document.addEventListener('click', () => {
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }, { once: false });

    // Background keep-alive (silent heartbeat every 15s)
    // Uses noise to prevent "Silence Detection" battery saving
    setInterval(() => {
        if (audioCtx.state === 'running') {
            const bufferSize = audioCtx.sampleRate * 0.1;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 0.01; }
            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            const gain = audioCtx.createGain();
            gain.gain.value = 0.00001; // Effectively inaudible
            source.connect(gain);
            gain.connect(audioCtx.destination);
            source.start();
        }
    }, 15000);

    // --- Web Worker Timer Setup (Prevents Background Throttling) ---
    const workerCode = `
        let timer = null;
        self.onmessage = function(e) {
            if (e.data === 'start') {
                if (timer) clearInterval(timer);
                timer = setInterval(() => { self.postMessage('tick'); }, 1000);
            } else if (e.data === 'stop') {
                clearInterval(timer);
                timer = null;
            }
        };
    `;
    const blob = new Blob([workerCode], { type: 'application/javascript' });
    const worker = new Worker(URL.createObjectURL(blob));
    worker.onmessage = () => { update(); };
    worker.postMessage('start');

    async function handleWakeLock(enabled) {
        if (!('wakeLock' in navigator)) return;
        if (enabled) {
            try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
        } else if (wakeLock) {
            wakeLock.release(); wakeLock = null;
        }
    }

    function playBeep() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const startTime = audioCtx.currentTime;
        [0, 0.25, 0.5].forEach(delay => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine'; 
            osc.frequency.setValueAtTime(880, startTime + delay); 
            gain.gain.setValueAtTime(0.5, startTime + delay);
            gain.gain.exponentialRampToValueAtTime(0.001, startTime + delay + 0.2);
            osc.start(startTime + delay);
            osc.stop(startTime + delay + 0.2);
        });
    }

    function openSettings() { document.getElementById('settingsOverlay').style.display = 'flex'; }
    function closeSettings(e) { if (e.target.id === 'settingsOverlay') e.target.style.display = 'none'; }

    function toggleTheme() {
        const body = document.body;
        const currentTheme = body.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        body.setAttribute('data-theme', newTheme);
        localStorage.setItem('dmo_tour_theme', newTheme);
        updateThemeIcon(newTheme);
    }

    function updateThemeIcon(theme) {
        const icon = document.getElementById('themeIcon');
        icon.innerHTML = theme === 'light' ? '<path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/>' : '<path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96a.996.996 0 000-1.41.996.996 0 00-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36a.996.996 0 000-1.41.996.996 0 00-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/>';
    }

    function saveSettings() {
        const settings = {
            spiral: document.getElementById('notifySpiral').checked,
            forest: document.getElementById('notifyForest').checked,
            tokyo: document.getElementById('notifyTokyo').checked,
            event: document.getElementById('notifyEvent').checked,
            leadTime: parseInt(document.getElementById('leadTime').value) || 1,
            wakeLock: document.getElementById('wakeLock').checked,
            showSpiral: document.getElementById('showSpiral').checked,
            showForest: document.getElementById('showForest').checked,
            showTokyo: document.getElementById('showTokyo').checked,
            showEvent: document.getElementById('showEvent').checked,
            enableEffects: document.getElementById('enableEffects').checked
        };
        localStorage.setItem('dmo_tour_settings', JSON.stringify(settings));
        handleWakeLock(settings.wakeLock);
        update(); 
    }

    function loadData() {
        const savedSettings = localStorage.getItem('dmo_tour_settings');
        if (savedSettings) {
            const s = JSON.parse(savedSettings);
            document.getElementById('notifySpiral').checked = s.spiral;
            document.getElementById('notifyForest').checked = s.forest;
            if(document.getElementById('notifyTokyo')) document.getElementById('notifyTokyo').checked = !!s.tokyo;
            document.getElementById('notifyEvent').checked = !!s.event;
            document.getElementById('leadTime').value = s.leadTime;
            document.getElementById('wakeLock').checked = !!s.wakeLock;
            
            if (s.hasOwnProperty('showSpiral')) document.getElementById('showSpiral').checked = s.showSpiral;
            if (s.hasOwnProperty('showForest')) document.getElementById('showForest').checked = s.showForest;
            if (s.hasOwnProperty('showTokyo')) document.getElementById('showTokyo').checked = s.showTokyo;
            if (s.hasOwnProperty('showEvent')) document.getElementById('showEvent').checked = s.showEvent;
            if (s.hasOwnProperty('enableEffects')) document.getElementById('enableEffects').checked = s.enableEffects;

            handleWakeLock(!!s.wakeLock);
        }
        const savedTheme = localStorage.getItem('dmo_tour_theme') || 'dark';
        document.body.setAttribute('data-theme', savedTheme);
        updateThemeIcon(savedTheme);
    }

    function createFallingPass() {
        const container = document.getElementById('eventRainContainer');
        if (!container) return;
        const pass = document.createElement('img');
        pass.src = 'images/pass.png';
        pass.className = 'falling-pass';
        const left = Math.random() * 100;
        pass.style.left = `${left}vw`;
        const duration = 5 + Math.random() * 10;
        pass.style.animationDuration = `${duration}s`;
        const size = 20 + Math.random() * 20;
        pass.style.width = `${size}px`;
        container.appendChild(pass);
        setTimeout(() => { if (pass.parentNode) container.removeChild(pass); }, duration * 1000);
    }

    function getNextSpawn(tour) {
        const now = new Date();
        const nowTotalSec = (now.getUTCHours() * 3600) + (now.getUTCMinutes() * 60) + now.getUTCSeconds();
        if (tour.type === "hourly") {
            const offsetSec = tour.offset * 60;
            let targetSec = (now.getUTCHours() * 3600) + offsetSec;
            if (nowTotalSec >= targetSec) targetSec += 3600;
            return (targetSec - nowTotalSec + 86400) % 86400;
        } 
        const intervalSec = tour.interval * 60;
        const refSec = (tour.refMinute * 60) % 86400;
        let diff = nowTotalSec - refSec;
        let intervalsCount = Math.ceil(diff / intervalSec);
        let nextSec = refSec + (intervalsCount * intervalSec);
        while (nextSec <= nowTotalSec) nextSec += intervalSec;
        return (nextSec - nowTotalSec + 86400) % 86400;
    }

    function formatTime(seconds) {
        const h = Math.floor(seconds / 3600);
        const m = Math.floor((seconds % 3600) / 60);
        const s = Math.floor(seconds % 60);
        return (h > 0 ? h + ":" : "") + String(m).padStart(2, '0') + ":" + String(s).padStart(2, '0');
    }

    function update() {
        const now = new Date();
        const sTime = document.getElementById('serverTime');
        if(sTime) sTime.innerText = now.toUTCString().split(' ')[4];
        const leadSec = (parseInt(document.getElementById('leadTime').value) || 1) * 60;
        const visibility = {
            spiral: document.getElementById('showSpiral').checked,
            forest: document.getElementById('showForest').checked,
            tokyo: document.getElementById('showTokyo').checked,
            event: document.getElementById('showEvent').checked
        };
        const effectsEnabled = document.getElementById('enableEffects').checked;

        const processItems = (itemList) => itemList
            .filter(item => visibility[item.category])
            .map(t => {
                const timeLeft = getNextSpawn(t);
                const interval = t.type === 'hourly' ? 3600 : t.interval * 60;
                const offsetAdjustment = (t.category === 'tokyo' && t.timing === 'special') ? 10 : 0;
                const elapsed = (interval - timeLeft + offsetAdjustment) % interval;
                const isLive = elapsed < t.liveDuration;
                let channel = null;
                if (isLive) {
                    if (t.label === 'Spiral Tour') {
                        if (elapsed < 90) channel = "ch 0";
                        else if (elapsed < 120) channel = "Swap to Ch 1";
                        else if (elapsed < 210) channel = "ch 1";
                        else if (elapsed < 240) channel = "Swap to Ch 2";
                        else if (elapsed < 330) channel = "ch 2";
                        else channel = "Finished";
                    } else if (t.label === 'Tokyo Tour') {
                        const seq = t.rotation === 'reverse' ? ["ch 2", "ch 1", "ch 0"] : ["ch 0", "ch 1", "ch 2"];
                        const cycleIndex = Math.floor(elapsed / 60);
                        const innerElapsed = elapsed % 60;
                        if (t.timing === 'special') {
                            if (innerElapsed < 35) channel = seq[cycleIndex];
                            else if (cycleIndex < 2) channel = "Swap to " + seq[cycleIndex + 1];
                            else channel = "Finished";
                        } else {
                            if (cycleIndex < 3) channel = seq[cycleIndex];
                            else channel = "Finished";
                        }
                    }
                }
                return { ...t, timeLeft, isLive, liveRemaining: isLive ? (t.liveDuration - elapsed) : 0, channel };
            });

        const tourData = processItems(tours);
        const eventData = processItems(specialEvents);

        const ogPassLive = eventData.some(e => e.id === 'ogpass' && e.isLive);
        const rainContainer = document.getElementById('eventRainContainer');
        const shineOverlay = document.getElementById('eventShineOverlay');
        if (ogPassLive && effectsEnabled) {
            rainContainer.style.display = 'block';
            shineOverlay.style.opacity = '1';
            if (!effectInterval) { effectInterval = setInterval(createFallingPass, 800); }
        } else {
            if (rainContainer) rainContainer.style.display = 'none';
            if (shineOverlay) shineOverlay.style.opacity = '0';
            if (effectInterval) { clearInterval(effectInterval); effectInterval = null; }
            if (rainContainer) rainContainer.innerHTML = '';
        }

        const checkNotify = (current, previousList, settingKey, onlyBossId = null) => {
            const settingEl = document.getElementById(settingKey);
            if (!settingEl || !settingEl.checked) return;
            const prev = previousList.find(p => p.id === current.id);
            if (!prev) return;
            if (prev.timeLeft > leadSec && current.timeLeft <= leadSec && current.timeLeft > 0) {
                if (!onlyBossId || current.id === onlyBossId) playBeep();
            }
        };

        tourData.forEach(t => {
            if (t.category === 'spiral') checkNotify(t, lastToursData, 'notifySpiral', 'shellmon');
            if (t.category === 'forest') checkNotify(t, lastToursData, 'notifyForest', 'orochimon');
            if (t.category === 'tokyo') checkNotify(t, lastToursData, 'notifyTokyo', 'tokyo_myotismon_1');
        });
        eventData.forEach(e => checkNotify(e, lastEventData, 'notifyEvent'));

        lastToursData = tourData; lastEventData = eventData;

        let liveHtml = "", upcomingHtml = "", eventHtml = "", fullHtml = "";
        const renderCard = (tour, extraClass = "") => {
            let buffText = tour.isLive && tour.label === 'Special Event' ? 'Collect your pass!' : (tour.buff && tour.buff !== "No Buff" ? tour.buff : "");
            return `<div class="boss-card ${tour.isLive ? 'active ' + extraClass : (tour.timeLeft < 900 ? 'upcoming' : '')}"><div class="boss-info"><span class="tour-label ${tour.lClass}">${tour.label}</span><div class="boss-name">${tour.name}</div><div class="boss-map">${tour.map}</div>${buffText ? `<div class="boss-buff">${buffText}</div>` : ''}</div><div class="timer-container"><div class="timer">${formatTime(tour.isLive ? tour.liveRemaining : tour.timeLeft)}</div>${tour.isLive && tour.channel ? `<div class="channel-indicator">${tour.channel}</div>` : ''}</div></div>`;
        };

        tourData.forEach(t => { if (t.isLive) liveHtml += renderCard(t); else if (t.timeLeft < 900) upcomingHtml += renderCard(t); });
        eventData.forEach(e => eventHtml += renderCard(e, 'event-active'));
        tourData.filter(t => !t.isLive && t.timeLeft >= 900).sort((a, b) => a.timeLeft - b.timeLeft).forEach(t => fullHtml += renderCard(t));

        if(document.getElementById('liveSection')) document.getElementById('liveSection').style.display = liveHtml ? 'block' : 'none';
        if(document.getElementById('liveList')) document.getElementById('liveList').innerHTML = liveHtml;
        if(document.getElementById('eventSection')) document.getElementById('eventSection').style.display = visibility.event ? 'block' : 'none';
        if(document.getElementById('eventList')) document.getElementById('eventList').innerHTML = eventHtml;
        if(document.getElementById('upcomingList')) document.getElementById('upcomingList').innerHTML = upcomingHtml || '<div class="empty-msg">No tours starting soon...</div>';
        if(document.getElementById('fullList')) document.getElementById('fullList').innerHTML = fullHtml;
    }

    document.querySelectorAll('input').forEach(input => { input.addEventListener('change', saveSettings); });
    document.getElementById('leadTime').addEventListener('change', saveSettings);
    window.onload = () => { loadData(); update(); };
</script>
